<div class="like-widget-container"
  (click)="like()"
  (keyup.enter)="like()">
  <fa-icon
    role="button"
    tabindex="0"
    [attr.aria-describedby]="id"
    size="1x"
    [icon]="fonts.faThumbsUp">
  </fa-icon>

  <span
    [attr.id]="id"
    [attr.aria-label]="likes + ':people liked'"
    class="like-counter"
    aria-live="true"
    aria-atomic="true">
    {{ likes }}
  </span>
<!--aria-live: Todo momento que o conteúdo da tag muda, o leitor de tela anuncia o novo valor.
    aria-atomic: Para que o leitor de tela leia todo o conteúdo da tag span
    [attr.aria-describedby]="id": Liga o icon com o span.-->
</div>
